apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: icarus-external-secrets-aks-ninja-dev-06
  namespace: argocd
  labels:
    type: platform
spec:
  project: default
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: "v0.14.1"
      helm:
        releaseName: external-secrets
    - repoURL: https://github.com/jonasnorlund/aks-platform-setup
      targetRevision: HEAD
      path: clusters/aks-ninja-dev-06/external-secrets
  destination:
    name: aks-ninja-dev-06
    namespace: external-secrets
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

