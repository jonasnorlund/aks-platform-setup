apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: cluster-azure-store
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      serviceAccountRef:
        name: sa-workload-identity
        namespace: external-secrets
      vaultUrl: https://kv-crazyninja-ri7f.vault.azure.net
---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    azure.workload.identity/client-id: fc9dbe57-8df5-4691-8953-751b9ff8fe92
    azure.workload.identity/tenant-id: c7bcbdd7-a080-4551-9f40-bdfc308ec2f2
  name: sa-workload-identity
  namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ext-argocd-secret
  namespace: argocd
spec:
  data:
    - remoteRef:
        key: argocd-clientsecret
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
      secretKey: oic
  refreshInterval: 3m
  secretStoreRef:
    kind: ClusterSecretStore
    name: cluster-azure-store
  target:
    creationPolicy: Merge
    name: argocd-secret
    template:
      data:
        oidc.azure.clientSecret: "{{ .oic }}"
      engineVersion: v2
      mergePolicy: Merge
      type: Opaque
---
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: ext-wildcard-crazyninja-io
spec:
  externalSecretSpec:
    data:
      - remoteRef:
          key: secret/wildcard-crazyninja-io
          conversionStrategy: Default	
          decodingStrategy: None
          metadataPolicy: None
        secretKey: tls
    refreshInterval: 1h
    secretStoreRef:
      kind: ClusterSecretStore
      name: cluster-azure-store
    target:
      template:
        data:
          tls.crt: "{{ .tls | b64dec | pkcs12cert }}"
          tls.key: "{{ .tls | b64dec | pkcs12key }}"
        engineVersion: v2
        type: kubernetes.io/tls
  namespaceSelectors:
    - matchLabels:
        provisioncertificate: "yes"
  refreshTime: 1m
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wildcard-crazyninja-io
  namespace: argocd
spec:
  secretStoreRef:
      kind: ClusterSecretStore
      name: cluster-azure-store
  target:
    template:
      data:
        tls.crt: "{{ .tls | b64dec | pkcs12cert }}"
        tls.key: "{{ .tls | b64dec | pkcs12key }}"
      engineVersion: v2
      type: kubernetes.io/tls
  data:
    - remoteRef:
        key: secret/wildcard-crazyninja-io
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
      secretKey: tls
  refreshInterval: 1h
    


