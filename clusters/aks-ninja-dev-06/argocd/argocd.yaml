apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ext-argocd-secret
  namespace: argocd
spec:
  data:
    - remoteRef:
        key: argocd-clientsecret
      secretKey: oic
  refreshInterval: 3m
  secretStoreRef:
    kind: ClusterSecretStore
    name: cluster-azure-store
  target:
    creationPolicy: Merge
    name: argocd-secret
    template:
      data:
        oidc.azure.clientSecret: "{{ .oic }}"
      engineVersion: v2
      mergePolicy: Merge
      type: Opaque
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: ext-wildcard-crazyninja-io
  namespace: argocd
spec:
  externalSecretSpec:
    data:
      - remoteRef:
          key: secret/wildcard-crazyninja-io
        secretKey: tls
    refreshInterval: 1h
    secretStoreRef:
      kind: ClusterSecretStore
      name: cluster-azure-store
    target:
      template:
        data:
          tls.crt: "{{ .tls | b64dec | pkcs12cert }}"
          tls.key: "{{ .tls | b64dec | pkcs12key }}"
        engineVersion: v2
        type: kubernetes.io/tls
  namespaceSelectors:
    - matchLabels:
        provisioncertificate: "yes"
  refreshTime: 1m
