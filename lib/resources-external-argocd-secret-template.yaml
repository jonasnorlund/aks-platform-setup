---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ext-argocd-secret
  namespace: argocd
spec:
  data:
    - remoteRef:
        key: argocd-clientsecret
      secretKey: oic
  refreshInterval: 3m
  secretStoreRef:
    kind: ClusterSecretStore
    name: cluster-azure-store
  target:
    creationPolicy: Merge
    name: argocd-secret
    template:
      data:
        oidc.azure.clientSecret: "{{ .oic }}"
      engineVersion: v2
      mergePolicy: Merge
      type: Opaque