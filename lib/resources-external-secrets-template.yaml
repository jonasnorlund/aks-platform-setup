---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: cluster-azure-store
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      serviceAccountRef:
        name: sa-workload-identity
        namespace: external-secrets
      vaultUrl: ${VAULTURL}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    azure.workload.identity/client-id: ${PLATFORMCLIENTID}
    azure.workload.identity/tenant-id: ${TENANTID}
  name: sa-workload-identity
  namespace: external-secrets
