apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: cluster-azure-store
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      serviceAccountRef:
        name: sa-workload-identity
        namespace: external-secrets
      vaultUrl: ${VAULTURL}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    azure.workload.identity/client-id: ${PLATFORMCLIENTID}
    azure.workload.identity/tenant-id: ${TENANTID}
  name: sa-workload-identity
  namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ext-argocd-secret
  namespace: argocd
spec:
  data:
    - remoteRef:
        key: argocd-clientsecret
      secretKey: oic
  refreshInterval: 3m
  secretStoreRef:
    kind: ClusterSecretStore
    name: cluster-azure-store
  target:
    creationPolicy: Merge
    name: argocd-secret
    template:
      data:
        oidc.azure.clientSecret: "{{ .oic }}"
      engineVersion: v2
      mergePolicy: Merge
      type: Opaque
---
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: ext-${CERT_NAME}
spec:
  externalSecretSpec:
    data:
      - remoteRef:
          key: secret/${CERT_NAME}
        secretKey: tls
    refreshInterval: 1h
    secretStoreRef:
      kind: ClusterSecretStore
      name: cluster-azure-store
    target:
      template:
        data:
          tls.crt: "{{ .tls | b64dec | pkcs12cert }}"
          tls.key: "{{ .tls | b64dec | pkcs12key }}"
        engineVersion: v2
        type: kubernetes.io/tls
  namespaceSelectors:
    - matchLabels:
        provisioncertificate: "yes"
  refreshTime: 1m
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ext-${CERT_NAME}
  namespace: argocd
spec:
  secretStoreRef:
      kind: ClusterSecretStore
      name: cluster-azure-store
  target:
    template:
      data:
        tls.crt: "{{ .tls | b64dec | pkcs12cert }}"
        tls.key: "{{ .tls | b64dec | pkcs12key }}"
      engineVersion: v2
      type: kubernetes.io/tls
  data:
    - remoteRef:
        key: secret/${CERT_NAME}
      secretKey: tls
  refreshInterval: 1h
    

