apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: icarus-external-secrets-${ENV}
  namespace: argocd
  labels:
    type: platform
spec:
  project: default
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: "v0.14.1"
      helm:
        releaseName: external-secrets
    - repoURL: ${PLATFORM_REPOURL}
      targetRevision: HEAD
      path: clusters/${env}/external-secrets
  destination:
    name: ${ENV}
    namespace: external-secrets
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
