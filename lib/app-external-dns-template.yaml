apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: icarus-external-dns-${ENV}
  namespace: argocd
  labels:
    type: platform
spec:
  project: default
  sources:
    - repoURL: https://kubernetes-sigs.github.io/external-dns
      chart: external-dns
      targetRevision: "1.15.0"
      helm:
        releaseName: external-dns
        valuesObject:
          fullnameOverride: external-dns
          serviceAccount: 
            name: sa-workload-identity
            labels: 
              azure.workload.identity/use: "true"
            annotations: 
              azure.workload.identity/client-id: ${PLATFORMCLIENTID} # platform managed identity
          podLabels: 
            azure.workload.identity/use: "true"
          extraVolumes: 
            - name: "azure-config-file"
              secret: 
                secretName: external-dns-azure
          extraVolumeMounts: 
            - name: "azure-config-file"
              mountPath: /etc/kubernetes
              readOnly: true
          provider: 
            name: azure-private-dns
          sources: 
            - ingress
          domainFilters:
            - ${EXT_DNS_DOMAINFILTER}
          policy: sync
          txtPrefix: ${ENV} #this should be unique for every external-dns instance to avoid deletion of DNS records created by other instances
    - repoURL: ${PLATFORM_REPOURL}
      targetRevision: HEAD
      path: clusters/${ENV}/external-dns
  destination:
    name: ${ENV}
    namespace: external-dns
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

